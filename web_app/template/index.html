<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Simple Home Page</title>
    <style>
        /* Basic Reset & Typography */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; line-height: 1.6; color: #333; }

        /* Navigation */
        nav { background: #2c3e50; padding: 1rem; display: flex; justify-content: space-between; align-items: center; }
        nav a { color: white; text-decoration: none; margin-left: 20px; font-weight: 500; }
        .logo { font-size: 1.5rem; font-weight: bold; color: white; }

        /* Hero Section */
        .hero { 
            height: 60vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            background: #f4f7f6; 
            text-align: center;
            padding: 20px;
        }
        .hero h1 { font-size: 3rem; margin-bottom: 10px; }
        .btn { 
            background: #3498db; 
            color: white; 
            padding: 12px 24px; 
            border-radius: 5px; 
            text-decoration: none; 
            margin-top: 20px; 
        }

        /* Footer */
        footer { text-align: center; padding: 2rem; font-size: 0.9rem; color: #666; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">BrandName</div>
        <div>
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </div>
    </nav>

    <main>
        <section class="hero">
            <h1>Welcome to My Website</h1>
            <p>This is a simple, responsive home page built with clean HTML and CSS.</p>
            <a href="#" class="btn">Get Started</a>
        </section>
    </main>

    <footer>
        &copy; 2026 BrandName. All rights reserved.
    </footer>

</body>
</html>
